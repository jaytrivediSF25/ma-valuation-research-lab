name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy deal_pipeline app analyze_deal.py scripts
      - name: Security scan
        run: bandit -q -r deal_pipeline app scripts analyze_deal.py
      - name: Contracts
        run: python scripts/check_contracts.py --data-dir ./data --output-dir ./output --strict
      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ma-valuation-research-lab:ci .
